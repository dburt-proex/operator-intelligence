<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">CASA and DiffWall governed execution ecosystem</title>
  <desc id="desc">DiffWall applies deterministic rules to code and configuration changes before merge or deployment. CASA governs live AI actions before they can reach tools, APIs, or state-changing systems. Both write evidence to a shared decision ledger.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050914"/><stop offset="1" stop-color="#10182c"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#5de2ff"/><stop offset="1" stop-color="#8b7bff"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1c2b47" stroke-width="1" opacity=".45"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5 0 10z" fill="#6cdbff"/></marker>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;fill:#f5f8ff;font-weight:700}.sub{font-family:Arial,Helvetica,sans-serif;fill:#b7c4db;font-size:18px}.eyebrow{font-family:Arial,Helvetica,sans-serif;fill:#6ee7ff;font-size:14px;font-weight:bold;letter-spacing:1.6px}.body{font-family:Arial,Helvetica,sans-serif;fill:#d7e3f8;font-size:16px}.minor{font-family:Arial,Helvetica,sans-serif;fill:#92a4c2;font-size:14px}.card{fill:#091427;stroke:#34597f;stroke-width:2}.flow{fill:none;stroke:url(#cyan);stroke-width:3;marker-end:url(#arrow)}.line{stroke:#385676;stroke-width:1.5}.tag{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;letter-spacing:1.1px}.gate{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:700}
    </style>
  </defs>
  <rect width="1600" height="1120" fill="url(#bg)"/><rect width="1600" height="1120" fill="url(#grid)"/>
  <text x="70" y="68" class="eyebrow">GOVERNED EXECUTION PLATFORM · v0.2.0</text>
  <text x="70" y="118" class="title" font-size="40">CASA + DIFFWALL GOVERNED EXECUTION ECOSYSTEM</text>
  <text x="70" y="151" class="sub">Policy defines the boundary. DiffWall enforces change safety. CASA governs live actions.</text>

  <!-- shared policy source -->
  <g transform="translate(490 190)">
    <rect width="620" height="96" rx="18" fill="#111a35" stroke="#836dff" stroke-width="2"/>
    <text x="310" y="33" text-anchor="middle" class="eyebrow" fill="#b8aaff">VERSIONED GOVERNANCE POLICY</text>
    <text x="310" y="65" text-anchor="middle" class="body">risk thresholds · approval requirements · protected assets · audit requirements</text>
  </g>

  <!-- lane labels -->
  <text x="70" y="337" class="eyebrow" fill="#7dd3fc">CHANGE-TIME CONTROL · BEFORE MERGE OR DEPLOYMENT</text>
  <text x="70" y="625" class="eyebrow" fill="#6ee7b7">RUNTIME CONTROL · BEFORE A LIVE ACTION CAN REACH A TOOL, API, OR STATE</text>

  <!-- DiffWall lane -->
  <g transform="translate(70 365)">
    <rect class="card" width="300" height="180" rx="18"/>
    <text x="24" y="36" class="eyebrow">CHANGE INTAKE</text>
    <text x="24" y="72" class="title" font-size="25">Proposed change</text>
    <text x="24" y="108" class="body">pull request</text><text x="24" y="134" class="body">agent plan</text><text x="24" y="160" class="body">configuration or deployment change</text>
  </g>
  <path class="flow" d="M370 455H462"/>
  <g transform="translate(462 338)">
    <rect width="420" height="235" rx="20" fill="#0c1d36" stroke="#48c7ff" stroke-width="3"/>
    <text x="28" y="42" class="eyebrow">DIFFWALL · DETERMINISTIC CHANGE ENFORCEMENT</text>
    <text x="28" y="82" class="title" font-size="28">Scan → rules → verdict</text>
    <text x="28" y="118" class="body">1. Scan proposed code / configuration</text>
    <text x="28" y="146" class="body">2. Apply deterministic rules</text>
    <text x="28" y="174" class="body">3. Emit verdict + full rule trace + CI exit code</text>
    <text x="28" y="211" class="minor">DiffWall does not execute the action. It blocks or routes unsafe change.</text>
  </g>
  <path class="flow" d="M882 455H970"/>
  <g transform="translate(970 353)">
    <rect width="560" height="205" rx="18" class="card"/>
    <text x="28" y="36" class="eyebrow">CHANGE VERDICT</text>
    <circle cx="45" cy="74" r="10" fill="#ff7181"/><text x="68" y="80" class="gate" fill="#ff9ba6">HALT</text><text x="158" y="80" class="body">destructive change or exposed secret</text>
    <circle cx="45" cy="119" r="10" fill="#f5c85d"/><text x="68" y="125" class="gate" fill="#ffe093">REVIEW</text><text x="158" y="125" class="body">deploy, mutation, broadcast, or unknown</text>
    <circle cx="45" cy="164" r="10" fill="#46df9c"/><text x="68" y="170" class="gate" fill="#83f1bd">ALLOW</text><text x="158" y="170" class="body">read-only or low-impact change</text>
  </g>
  <path d="M800 286V322" class="flow"/><path d="M800 286V596H920" class="flow"/>
  <text x="815" y="320" class="tag" fill="#9cb1d1">POLICY APPLIED</text>
  <text x="815" y="583" class="tag" fill="#9cb1d1">APPROVED POLICY + CHANGE EVIDENCE</text>

  <!-- CASA lane -->
  <g transform="translate(70 655)">
    <rect class="card" width="300" height="220" rx="18"/>
    <text x="24" y="36" class="eyebrow">RUNTIME INTAKE</text>
    <text x="24" y="72" class="title" font-size="25">Proposed live action</text>
    <text x="24" y="108" class="body">agent tool call</text><text x="24" y="134" class="body">API request</text><text x="24" y="160" class="body">file, database, or state change</text>
    <text x="24" y="202" class="minor">No action reaches execution ungoverned.</text>
  </g>
  <path class="flow" d="M370 765H462"/>
  <g transform="translate(462 628)">
    <rect width="450" height="275" rx="20" fill="#0a211d" stroke="#45e8aa" stroke-width="3"/>
    <text x="28" y="42" class="eyebrow" fill="#71f4bc">CASA · RUNTIME GOVERNANCE CONTROL PLANE</text>
    <text x="28" y="82" class="title" font-size="28">Evaluate before execution</text>
    <text x="28" y="122" class="body">1. Policy + context evaluation</text>
    <text x="28" y="151" class="body">2. Risk + confidence classification</text>
    <text x="28" y="180" class="body">3. ALLOW / REVIEW / HALT decision</text>
    <text x="28" y="209" class="body">4. Execution router + immutable audit record</text>
    <text x="28" y="247" class="minor">CASA does not inspect diffs. It governs the action now being attempted.</text>
  </g>
  <path class="flow" d="M912 765H970"/>
  <g transform="translate(970 655)">
    <rect width="560" height="220" rx="18" class="card"/>
    <text x="28" y="36" class="eyebrow">RUNTIME OUTCOME</text>
    <circle cx="45" cy="76" r="10" fill="#46df9c"/><text x="68" y="82" class="gate" fill="#83f1bd">ALLOW</text><text x="168" y="82" class="body">execute and log</text>
    <circle cx="45" cy="123" r="10" fill="#f5c85d"/><text x="68" y="129" class="gate" fill="#ffe093">REVIEW</text><text x="168" y="129" class="body">require human approval</text>
    <circle cx="45" cy="170" r="10" fill="#ff7181"/><text x="68" y="176" class="gate" fill="#ff9ba6">HALT</text><text x="168" y="176" class="body">block execution and alert</text>
  </g>

  <!-- ledger -->
  <path class="flow" d="M1250 558V940"/>
  <path class="flow" d="M687 903V940"/>
  <g transform="translate(70 958)">
    <rect width="1460" height="112" rx="18" fill="#0a1222" stroke="#3d5479" stroke-width="2"/>
    <text x="30" y="35" class="eyebrow">SHARED DECISION LEDGER · EVIDENCE BRIDGE BETWEEN CHANGE-TIME AND RUNTIME</text>
    <text x="30" y="71" class="title" font-size="23">policy version · action or change ID · verdict · rule trace · approver · timestamp · replay record</text>
    <text x="30" y="96" class="minor">DiffWall and CASA both send decision evidence here, enabling audit, replay, incident review, and policy improvement.</text>
  </g>
  <text x="70" y="1105" class="minor">CONTROL LOOP: DEFINE POLICY → GATE CHANGE → GOVERN EXECUTION → RECORD EVIDENCE → IMPROVE POLICY</text>
</svg>
