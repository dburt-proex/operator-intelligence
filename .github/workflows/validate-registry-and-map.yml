name: Validate registry and repository map

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run registry conformance regression tests
        run: python -m unittest registry/test_validate_registry.py
      - name: Validate artifact registry
        run: python registry/validate_registry.py
      - name: Verify generated repository map
        run: python tools/generate_repository_map.py --check
      - name: Run field reliability self-test
        run: python reliability/field_reliability_validator.py --self-test
      - name: Validate agentic control platform readiness package
        run: python playbooks/agentic-control-platform-readiness/validate_package.py --self-test
