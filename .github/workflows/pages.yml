name: Deploy Governance Platform to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "governance-platform/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare isolated site artifact
        run: |
          set -euo pipefail
          mkdir -p _site/governance-platform
          for file in index.html architecture.svg; do
            source_path="governance-platform/${file}"
            if [[ ! -f "${source_path}" ]]; then
              echo "Missing publish asset: ${source_path}" >&2
              exit 1
            fi
            cp "${source_path}" "_site/governance-platform/${file}"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
